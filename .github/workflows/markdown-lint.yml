name: Markdown Linting

on:
  pull_request:
    paths:
      - '**.md'
  push:
    paths:
      - '**.md'
      - '.github/workflows/markdown-lint.yml'

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    name: Lint markdown files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Run markdown linter
        run: |
          markdownlint --config .markdownlintrc.json '**/*.md' || echo "Some markdown issues found. Please review above."
        continue-on-error: true

      - name: Summary
        run: echo "✅ Markdown linting complete. Review any issues in the output above."
